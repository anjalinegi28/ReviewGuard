name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CPU torch + deps
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Lint (flake8, non-blocking on style-only issues)
        run: |
          pip install flake8
          flake8 src api tests --max-line-length=110 --extend-ignore=E203,W503 --exit-zero

      - name: Generate synthetic dataset for tests
        run: python -m src.data.synthetic --n 500 --out data/processed/reviews.csv

      - name: Run tests
        run: pytest -v --maxfail=1

      - name: Build Docker image
        run: docker build -t reviewguard:ci .
